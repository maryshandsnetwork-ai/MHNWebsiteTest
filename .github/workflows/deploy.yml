name: Deploy to DreamHost

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Sync files to DreamHost via SFTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ams1-shared-02.dreamhost.com
          username: dh_n5xhce
          password: ${{ secrets.DREAMHOST_SFTP_PASSWORD }}
          protocol: sftp
          port: 22
          server-dir: /home/dh_n5xhce/maryshandsnetwork.org/
          local-dir: ./
          exclude: |
            **/.git*
            **/.git*/**
            **/.github/**
            **/README.md
            **/vercel.json
            **/.DS_Store
